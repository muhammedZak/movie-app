<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | User</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />

    <link rel="stylesheet" href="/css/profile.css" />
  </head>
  <body class="bg-dark text-white">
    <div class="container py-5">
      <a href="index.html" class="btn btn-light mb-4">← Back</a>

      <div class="profile-card mx-auto text-center p-4">
        <div class="avatar-large" id="avatar"></div>

        <h2 id="name"></h2>
        <p id="email"></p>

        <a href="edit-profile.html" class="btn btn-danger mt-3">
          Edit Profile
        </a>
      </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
      const user = JSON.parse(localStorage.getItem('currentUser'));

      if (!user) window.location.href = 'login.html';

      document.getElementById('name').textContent = user.name;
      document.getElementById('email').textContent = user.email;

      const avatar = document.getElementById('avatar');
      avatar.textContent = user.name.charAt(0).toUpperCase();
    </script>
  </body>
</html>
