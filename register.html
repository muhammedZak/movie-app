<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | User</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />

    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body class="login-page">
    <div class="login-bg"></div>
    <div class="login-overlay"></div>

    <div class="login-container">
      <div class="login-card">
        <h2 class="mb-4">Sign Up</h2>
        <form id="registerForm">
          <div class="mb-3">
            <input
              id="name"
              type="text"
              placeholder="Full Name"
              class="form-control" />
            <div class="error-text"></div>
          </div>

          <div class="mb-3">
            <input
              id="email"
              type="email"
              placeholder="Email Address"
              class="form-control" />
            <div class="error-text"></div>
          </div>

          <div class="mb-3">
            <input
              id="password"
              type="password"
              placeholder="Password"
              class="form-control" />
            <div class="error-text"></div>
          </div>

          <button type="submit" class="btn btn-primary w-100">Sign Up</button>
        </form>
        <p class="mt-3">
          Already have an account?
          <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>

    <script src="js/validate.js"></script>
    <script src="js/auth.js"></script>
    <script>
      document
        .getElementById('registerForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();

          const nameInput = document.getElementById('name');
          const emailInput = document.getElementById('email');
          const passwordInput = document.getElementById('password');

          if (!validateRegister(nameInput, emailInput, passwordInput)) {
            return;
          }

          register(
            nameInput.value.trim(),
            emailInput.value.trim(),
            passwordInput.value.trim(),
          );
        });
    </script>
  </body>
</html>
