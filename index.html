<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stream - mini</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="w-100 top-0 z-3">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
          <a class="nav-header text-white navbar-brand fw-bolder" href="#"
            >StreamMini</a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active fw-bold" href="#home">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link fw-bold" href="#rows">Browse</a>
              </li>
              <li class="nav-item">
                <a href="mylist.html" class="nav-link fw-bold">My List</a>
              </li>
            </ul>
            <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
              <input
                type="search"
                id="searchInput"
                class="form-control form-control-sm bg-transparent border-secondary"
                placeholder="Search titles..."
                aria-label="Search movies" />

              <div id="authSection"></div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <section id="heroCarousel" class=""></section>
    <main>
      <section id="rows" class="mt-4 px-4">
        <div id="movieRows"></div>
      </section>
    </main>
    <footer class="footer mt-5">
      <div class="container-fluid px-5 py-5">
        <div class="row">
          <div class="col-md-3 mb-4">
            <h5 class="footer-logo">StreamMini</h5>
            <p class="footer-text">Watch trending movies anytime, anywhere.</p>
          </div>

          <div class="col-6 col-md-2 mb-4">
            <h6>Browse</h6>
            <ul>
              <li><a href="#">Home</a></li>
              <li><a href="#">Trending</a></li>
              <li><a href="#">Top Rated</a></li>
            </ul>
          </div>

          <div class="col-6 col-md-2 mb-4">
            <h6>Account</h6>
            <ul>
              <li><a href="mylist.html">My List</a></li>
              <li><a href="#">Profile</a></li>
            </ul>
          </div>

          <div class="col-6 col-md-2 mb-4">
            <h6>Help</h6>
            <ul>
              <li><a href="#">Support</a></li>
              <li><a href="#">Contact</a></li>
            </ul>
          </div>

          <div class="col-md-3 mb-4">
            <h6>Follow</h6>
            <div class="social-icons">
              <span>🌐</span>
              <span>🐦</span>
              <span>📺</span>
            </div>
          </div>
        </div>

        <hr />

        <p class="text-center footer-copy">
          © 2026 StreamMini. All rights reserved.
        </p>
      </div>
    </footer>
    <div id="toast" class="toast-box"></div>
    <button id="scrollTopBtn">↑</button>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
    <script src="/js/auth.js"></script>
  </body>
</html>
