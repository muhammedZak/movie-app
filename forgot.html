<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | User</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <link rel="stylesheet" href="/css/forgot.css" />
  </head>
  <body class="forgot-page">
    <div class="bg"></div>
    <div class="overlay"></div>

    <div
      class="container d-flex justify-content-center align-items-center vh-100">
      <div class="card-box">
        <h2 class="text-center mb-4">Forgot Password</h2>

        <!-- Email Form -->
        <form id="emailForm">
          <div class="mb-3">
            <input
              id="email"
              type="email"
              class="form-control"
              placeholder="Enter your email" />
            <div class="error-text"></div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Send OTP</button>
        </form>

        <!-- OTP Form -->
        <form id="otpForm" class="hidden">
          <div class="mb-3">
            <input
              id="otp"
              type="text"
              class="form-control text-center"
              placeholder="Enter OTP" />
            <div class="error-text"></div>
          </div>
          <button type="submit" class="btn btn-warning w-100">
            Verify OTP
          </button>
        </form>

        <!-- Reset Form -->
        <form id="resetForm" class="hidden">
          <div class="mb-3">
            <input
              id="newPassword"
              type="password"
              class="form-control"
              placeholder="New Password" />
            <div class="error-text"></div>
          </div>
          <button type="submit" class="btn btn-success w-100">
            Reset Password
          </button>
        </form>

        <p class="text-center mt-3">
          <a href="login.html" class="back-link">← Back to Login</a>
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
      emailjs.init('iPbDaxQAmmYDTt82O');
    </script>

    <script src="js/forgot.js"></script>
  </body>
</html>
